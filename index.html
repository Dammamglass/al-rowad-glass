<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الرواد للزجاج السيكوريت</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Tahoma,Arial,sans-serif;background:#f7f7f7;color:#222}
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('https://images.unsplash.com/photo-1513694203232-719a280e022f?q=80&w=1600&auto=format&fit=crop') center/cover;
color:#fff;
padding:20px}
.hero h1{font-size:48px;margin-bottom:15px}
.hero p{font-size:22px;max-width:700px;margin:auto auto 25px}
.btn{
display:inline-block;
padding:15px 28px;
background:#0d6efd;
color:#fff;
text-decoration:none;
border-radius:10px;
font-weight:bold}
.services{
max-width:1100px;
margin:60px auto;
padding:20px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px}
.card{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center}
footer{
background:#111;
color:#fff;
text-align:center;
padding:25px;
margin-top:40px}
</style>
</head>
<body>

<section class="hero">
<div>
<h1>الرواد للزجاج السيكوريت</h1>
<p>تفصيل وتركيب واجهات الزجاج والأبواب والشاور والدرابزين في الدمام والخبر والقطيف.</p>
<a class="btn" href="#services">اطلب عرض سعر</a>
</div>
</section>

<section class="services" id="services">
<h2 style="text-align:center;margin-bottom:30px">خدماتنا</h2>
<div class="grid">
<div class="card">واجهات زجاج سيكوريت</div>
<div class="card">أبواب زجاج</div>
<div class="card">شاور زجاج</div>
<div class="card">درابزين زجاج</div>
<div class="card">مرايا</div>
<div class="card">مكاتب زجاجية</div>
</div>
</section>

<footer>© الرواد للزجاج السيكوريت</footer>

</body>
</html>
